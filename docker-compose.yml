version: "3.9"

services:
  # ────────────────────────────────────────────
  #  Base de datos PostgreSQL
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: elfundo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elfundo
      POSTGRES_PASSWORD: ${DATABASE_PASS:-elfundo_dev_pass}
      POSTGRES_DB: elfundo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elfundo -d elfundo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  #  Redis (caché + BullMQ + pub/sub)
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elfundo_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  #  API Backend NestJS
  # ────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: elfundo_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://elfundo:${DATABASE_PASS:-elfundo_dev_pass}@postgres:5432/elfundo_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      API_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/shared:/app/packages/shared
    command: pnpm run dev

  # ────────────────────────────────────────────
  #  Web Ecommerce Next.js
  # ────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: elfundo_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public

  # ────────────────────────────────────────────
  #  Nginx Reverse Proxy
  # ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: elfundo_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/conf.d:/etc/nginx/conf.d
    profiles:
      - production

  # ────────────────────────────────────────────
  #  PgAdmin (solo desarrollo)
  # ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: elfundo_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@elfundo.cl
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: elfundo_network
